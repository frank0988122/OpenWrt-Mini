name: OpenWrt-合集版

on:
workflow_dispatch:

permissions:
contents: write

env:
REPO_URL: https://github.com/coolsnowwolf/lede
REPO_BRANCH: master
FEEDS_CONF: feeds.conf.default
CONFIG_FILE: OK2.config
DIY_P1_SH: DIY-1.sh
DIY_P2_SH: DIY-2.sh
UPLOAD_FIRMWARE: true
UPLOAD_RELEASE: true
TZ: Asia/Shanghai

jobs:
build:
runs-on: ubuntu-22.04

```
steps:

- name: Checkout
  uses: actions/checkout@v4

- name: Free Disk Space
  uses: coder-xiaomo/free-disk-space@main
  with:
    tool-cache: false
    android: true
    dotnet: true
    haskell: true
    large-packages: true
    docker-images: true
    swap-storage: true

- name: Show System Info
  run: |
    echo "CPU:"
    lscpu
    echo ""
    echo "Memory:"
    free -h
    echo ""
    echo "Disk:"
    df -hT

- name: Install Dependencies
  env:
    DEBIAN_FRONTEND: noninteractive
  run: |
    sudo -E apt-get update

    sudo -E apt-get install -y \
    build-essential clang flex bison g++ gawk \
    gcc-multilib g++-multilib gettext git \
    libncurses5-dev libssl-dev rsync swig unzip \
    zlib1g-dev file wget curl vim \
    llvm python3 python3-setuptools \
    python3-pyelftools libpython3-dev \
    aria2 jq qemu-utils ccache rename \
    libelf-dev device-tree-compiler \
    libgmp3-dev libmpc-dev libfuse-dev \
    squashfs-tools xxd

    sudo timedatectl set-timezone "$TZ"

    sudo mkdir -p /workdir
    sudo chown $USER:$USER /workdir

- name: Clone Source Code
  working-directory: /workdir
  run: |
    git clone --depth 1 \
    $REPO_URL \
    -b $REPO_BRANCH \
    openwrt

    ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

- name: Expand Build Space
  run: |
    sudo mkdir -p -m 777 /mnt/openwrt/dl
    sudo mkdir -p -m 777 /mnt/openwrt/bin
    sudo mkdir -p -m 777 /mnt/openwrt/staging_dir

    ln -sf /mnt/openwrt/dl openwrt/dl
    ln -sf /mnt/openwrt/bin openwrt/bin
    ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir

- name: Add Feeds
  run: |
    [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default

    chmod +x $DIY_P1_SH

    cd openwrt

    $GITHUB_WORKSPACE/$DIY_P1_SH

- name: Update Feeds
  run: |
    cd openwrt
    ./scripts/feeds update -a

- name: Install Feeds
  run: |
    cd openwrt
    ./scripts/feeds install -a

- name: Load Config
  run: |
    [ -e files ] && mv files openwrt/files

    [ -e $CONFIG_FILE ] && \
    mv $CONFIG_FILE openwrt/.config

    chmod +x $DIY_P2_SH

    cd openwrt

    $GITHUB_WORKSPACE/$DIY_P2_SH

- name: Download Packages
  run: |
    cd openwrt

    make defconfig

    make download -j$(($(nproc)+1))

    find dl -size -1024c -exec rm -f {} \;

- name: OPKG Hash Hotfix
  run: |
    cd openwrt

    sed -i -E \
    's/^(PKG_MIRROR_HASH|PKG_HASH):=.*/\1:=skip/' \
    package/system/opkg/Makefile || true

    [ -f package/network/utils/fullconenat-nft/Makefile ] && \
    sed -i -E \
    's/^PKG_MIRROR_HASH:=.*/PKG_MIRROR_HASH:=skip/' \
    package/network/utils/fullconenat-nft/Makefile || true

- name: Compile Firmware
  id: compile
  run: |
    cd openwrt

    echo "$(($(nproc)+1)) threads"

    make -j$(($(nproc)+1)) || make -j1 V=s

    echo "status=success" >> $GITHUB_OUTPUT

    grep '^CONFIG_TARGET.*DEVICE.*=y' .config \
    | sed -r 's/.*DEVICE_(.*)=y/\1/' \
    > DEVICE_NAME

    [ -s DEVICE_NAME ] && \
    echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV

    echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
    echo "FILE_TIME=$(date "+%Y年%m月%d日")" >> $GITHUB_ENV
    echo "TAG_TIME=$(date +"%Y.%m.%d-%H%M%S")" >> $GITHUB_ENV

- name: Disk Usage
  if: (!cancelled())
  run: df -hT

- name: Organize Firmware
  id: organize
  if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
  run: |
    cd openwrt/bin/targets/*/*

    rm -rf packages

    echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    echo "status=success" >> $GITHUB_OUTPUT

- name: Upload Firmware
  uses: actions/upload-artifact@v4
  if: steps.organize.outputs.status == 'success'
  with:
    name: OpenWrt${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
    path: ${{ env.FIRMWARE }}

- name: Create Release Info
  id: tag
  if: env.UPLOAD_RELEASE == 'true'
  run: |
    echo "release_tag=${{ env.TAG_TIME }}" >> $GITHUB_OUTPUT

    cat > release.txt << EOF
    OpenWrt X86_64
    管理地址: 192.168.2.1
    默认密码: 无
    编译时间: ${{ env.FILE_TIME }}
    EOF

    echo "status=success" >> $GITHUB_OUTPUT

- name: Publish Release
  uses: softprops/action-gh-release@v2
  if: steps.tag.outputs.status == 'success'
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  with:
    name: ${{ env.FILE_TIME }} OpenWrt
    tag_name: ${{ steps.tag.outputs.release_tag }}
    body_path: release.txt
    files: ${{ env.FIRMWARE }}/*

- name: Delete Old Releases
  uses: dev-drprasad/delete-older-releases@master
  if: env.UPLOAD_RELEASE == 'true'
  with:
    keep_latest: 10
    delete_tags: true
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
